version: "3.8"

services:
  # postgres, redis, zookeeper, kafka intentionally have NO `ports:` —
  # they only need to be reachable from `engine` over Docker's internal
  # network (by service name), not from your host machine or, worse,
  # the public internet if this compose file is ever run on a bare
  # cloud VM. `docker exec -it marketpulse-postgres-1 psql ...` still
  # works for local debugging without publishing the port.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: marketpulse
      POSTGRES_DB: marketpulse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      # Plain TCP-connect healthcheck via bash's /dev/tcp, deliberately
      # NOT using `nc` — Confluent's images don't ship netcat, so an
      # nc-based healthcheck fails with "command not found" regardless
      # of whether Zookeeper itself is healthy. bash is guaranteed to
      # be present, so this has no extra dependency to go wrong.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/2181' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # cp-kafka boots the container fast but the broker itself isn't ready
  # to accept connections for a while after that (it has to register
  # with zookeeper first). Without a healthcheck here, `engine`'s
  # `depends_on` only waits for this container to *start*, not for
  # Kafka to actually be listening on 9092 — so engine would race ahead,
  # fail to connect, exhaust kafkajs's retries, and crash on a fresh
  # `docker compose up --build`. The healthcheck below makes `depends_on:
  # condition: service_healthy` on engine actually wait for a broker
  # that's really up.
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  engine:
    build: ./engine
    # Restarts automatically if it still crashes on startup (e.g. Kafka
    # takes longer than the healthcheck window on a slow machine). Not
    # `always`, since a genuine fatal config error (bad JWT_SECRET in
    # prod, etc.) should stay dead rather than crash-loop forever.
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://marketpulse:marketpulse@postgres:5432/marketpulse
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      # Falls back to the dev secret locally so `docker compose up` still
      # works out of the box. For a real deploy, set JWT_SECRET in the
      # environment (or an untracked .env file) — see README "Deploying".
      # index.js refuses to boot with the fallback if NODE_ENV=production.
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      SYMBOLS: AAPL,MSFT,BTC-USD
      DEFAULT_EXPOSURE_LIMIT: 1000000
      DEFAULT_POSITION_LIMIT: 10000
      # Optional: set both to require HTTP Basic Auth on /docs (Swagger
      # UI) — recommended once this is on a public URL, since /docs is
      # otherwise open to anyone and exposes the full API surface plus a
      # live "Try it out" console. Leave unset locally; it stays open.
      DOCS_USER: ${DOCS_USER:-}
      DOCS_PASSWORD: ${DOCS_PASSWORD:-}
    ports:
      - "4000:4000"

  dashboard:
    build: ./dashboard
    depends_on:
      - engine
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_WS_URL: ws://localhost:4000
      VITE_SYMBOLS: AAPL,MSFT,BTC-USD
    ports:
      - "5173:5173"

volumes:
  pgdata:
