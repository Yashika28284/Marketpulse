version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: marketpulse
      POSTGRES_DB: marketpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  engine:
    build: ./engine
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://marketpulse:marketpulse@postgres:5432/marketpulse
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: dev-secret-change-me
      SYMBOLS: AAPL,MSFT,BTC-USD
      DEFAULT_EXPOSURE_LIMIT: 1000000
      DEFAULT_POSITION_LIMIT: 10000
    ports:
      - "4000:4000"

  dashboard:
    build: ./dashboard
    depends_on:
      - engine
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_WS_URL: ws://localhost:4000
      VITE_SYMBOLS: AAPL,MSFT,BTC-USD
    ports:
      - "5173:5173"

volumes:
  pgdata:
